{% extends 'base.html' %}
{% block content %}

<div style="
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
    background:
        radial-gradient(circle at top, rgba(60,40,120,0.15) 0%, transparent 40%),
        linear-gradient(180deg, #05060b 0%, #020309 100%);
">


  <!-- LOGIN GLASS PANEL -->
  <div style="
      width:100%;
      max-width:420px;
      background:rgba(20, 26, 41, 0.8);
      border:1px solid var(--border-color);
      border-radius:var(--radius);
      padding:40px 32px;
      backdrop-filter:blur(12px);
      box-shadow:0 0 25px rgba(108,92,231,0.15);
  ">

    <!-- TITLE -->
    <h1 style="
      text-align:center;
      font-size:2rem;
      font-weight:800;
      background:linear-gradient(90deg,#9b72ff,#6c5ce7);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      margin-bottom:12px;
    ">
      Welcome Back
    </h1>

    <p style="text-align:center; color:var(--text-soft); margin-bottom:28px;">
      Login to your HackShield account
    </p>

    <!-- LOGIN FORM -->
    <form method="POST" id="loginForm">
      {% csrf_token %}

      <!-- Username -->
      <label>Username</label>
      <input type="text" id="username" name="username" required autocomplete="username">
      <div id="userFeedback" class="feedback"></div>

      <!-- Password -->
      <label>Password</label>
      <div style="position:relative;">
        <input type="password" id="password" name="password" required autocomplete="current-password">

        <!-- Toggle Button -->
        <button type="button" id="togglePass" class="eye-btn">
          <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
               stroke-width="2" stroke="currentColor" width="20" height="20"
               style="color:var(--accent-light);">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 
                  0 8.268 2.943 9.542 7-1.274 4.057-5.064 
                  7-9.542 7S3.732 16.057 2.458 12z"/>
          </svg>
        </button>
      </div>

      <div id="passFeedback" class="feedback"></div>

      <!-- Submit -->
      <button type="submit" class="btn btn-primary" style="width:100%; margin-top:6px;">
        Login
      </button>

    </form>

    <!-- LINKS -->
    <div style="text-align:center; color:var(--text-soft); font-size:0.9rem; margin-top:26px;">
      <p>
        Don't have an account?
        <a href="{% url 'register' %}" style="color:var(--accent-light); text-decoration:none;">
          Register here
        </a>
      </p>
      <p style="margin-top:8px;">
        <a href="{% url 'password_reset' %}" style="color:var(--accent-light); text-decoration:none;">
          Forgot Password?
        </a>
      </p>
    </div>

  </div>
</div>

<!-- EXTRA FORM STYLES (pure CSS) -->
<style>
  input {
    width: 100%;
    padding: 12px;
    border-radius: var(--radius);
    border: 1px solid var(--border-color);
    background: var(--bg-panel);
    color: var(--text-main);
    margin-bottom: 6px;
    transition: var(--transition);
  }

  input:focus {
    border-color: var(--accent-light);
    box-shadow: 0 0 0 2px rgba(108,92,231,0.25);
    outline: none;
  }

  label {
    display:block;
    font-weight:600;
    font-size:0.9rem;
    margin-bottom:6px;
    color:var(--text-soft);
  }

  .feedback {
    min-height:18px;
    font-size:0.8rem;
    margin-bottom:14px;
  }

  .eye-btn {
    position:absolute;
    right:10px;
    top:8px;
    background:none;
    border:none;
    cursor:pointer;
    padding:4px;
  }
</style>

<!-- VALIDATION + EYE TOGGLE SCRIPT -->
<script>
document.addEventListener('DOMContentLoaded', () => {

  const username = document.getElementById('username');
  const password = document.getElementById('password');
  const userFb   = document.getElementById('userFeedback');
  const passFb   = document.getElementById('passFeedback');

  /* Username Validation */
  username.addEventListener('input', () => {
    const ok = /^[a-zA-Z0-9._-]{3,20}$/.test(username.value);
    userFb.textContent = ok ? "Looks good" : "3–20 characters only";
    userFb.style.color = ok ? "#6c5ce7" : "#ff4d4d";
  });

  /* Password Strength (Basic Check) */
  password.addEventListener('input', () => {
    const v = password.value;
    const checks = [
      /[A-Z]/.test(v),
      /[a-z]/.test(v),
      /\d/.test(v),
      /[^A-Za-z0-9]/.test(v),
      v.length >= 8
    ];
    const score = checks.filter(Boolean).length;

    let msg = "";
    let color = "";

    if (score <= 2) { msg = "Weak Password"; color = "#ff4d4d"; }
    else if (score <= 4) { msg = "Medium Strength"; color = "#ffbb33"; }
    else { msg = "Strong Password"; color = "#6c5ce7"; }

    passFb.textContent = msg;
    passFb.style.color = color;
  });

  /* Password Eye Toggle */
  let visible = false;
  const toggleBtn = document.getElementById('togglePass');
  const eyeIcon = document.getElementById('eyeIcon');

  const eyeOpen = `
      <path stroke-linecap="round" stroke-linejoin="round"
       d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
      <path stroke-linecap="round" stroke-linejoin="round"
       d="M2.458 12C3.732 7.943 7.523 5 12 
       5c4.478 0 8.268 2.943 9.542 7-1.274 
       4.057-5.064 7-9.542 7S3.732 16.057 
       2.458 12z"/>
  `;

  const eyeClosed = `
      <path stroke-linecap="round" stroke-linejoin="round"
       d="M13.875 18.825A10.05 
        10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.965 
        9.965 0 012.828-4.419M9.88 9.88A3 
        3 0 0112 9c1.657 0 3 1.343 
        3 3 0 .35-.06.687-.17 1.002M9.88 
        9.88l4.24 4.24M15.75 15.75L21 
        21M3 3l6.75 6.75"/>
  `;

  toggleBtn.addEventListener('click', () => {
    visible = !visible;
    password.type = visible ? "text" : "password";
    eyeIcon.innerHTML = visible ? eyeClosed : eyeOpen;
  });

});
</script>

{% endblock %}
